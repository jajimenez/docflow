services:
  # Airflow application (DAG Processor, Scheduler and API)
  airflow:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg://docflow:docflow@airflow-db:5432/docflow"
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__CORE__DAGS_FOLDER: "/workspace/docflow/dags"
      AIRFLOW__CORE__PLUGINS_FOLDER: "/workspace/docflow/plugins"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__TEST_CONNECTION: "Enabled"
      AIRFLOW__API__EXPOSE_CONFIG: "true"  # In production, set to False
      # Allow dynamically mapped tasks to expand into more than the default 1024
      # instances (e.g. Confluence spaces with many pages).
      AIRFLOW__CORE__MAX_MAP_LENGTH: "10000"
      # SimpleAuthManager is the default auth manager in Airflow 3. Declare the
      # admin user here; the password is seeded by airflow-init.sh into the file
      # below so it stays predictable across container rebuilds.
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:Admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/workspace/docflow/.devcontainer/airflow-passwords.json"
      # Docflow settings
      DOCFLOW_PDF_PENDING_DIR: "/workspace/docflow/pdf/pending"
      DOCFLOW_PDF_PROCESSED_DIR: "/workspace/docflow/pdf/processed"
      DOCFLOW_PDF_FAILED_DIR: "/workspace/docflow/pdf/failed"
      DOCFLOW_PDF_EXTRACTION_MODELS_PATH: "/home/airflow/.cache/docling/models"
      DOCFLOW_MAX_ACTIVE_PROCESSING_TASKS: "4"
      DOCFLOW_EMBEDDINGS_API_URL: "http://ollama:11434/api/embeddings"
      DOCFLOW_KNOWLEDGE_DB_HOST: "knowledge-db"
      DOCFLOW_KNOWLEDGE_DB_USER: "docflow"
      DOCFLOW_KNOWLEDGE_DB_PASSWORD: "docflow"
      DOCFLOW_KNOWLEDGE_DB_PORT: "5432"
      DOCFLOW_KNOWLEDGE_DB_NAME: "docflow"
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace/docflow
      - airflow-pip-cache:/home/airflow/.cache/pip

    # Prevent the container from exiting immediately
    command: "sleep infinity"
  
    depends_on:
      airflow-db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      knowledge-db:
        condition: service_healthy

  # Airflow Metadata Database
  airflow-db:
    image: postgres:18.4
    environment:
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
      POSTGRES_DB: docflow
    volumes:
      - airflow-db-data:/var/lib/postgresql
    restart: unless-stopped
    
    # After 10 seconds, Docker Engine runs "pg_isready" every 5 seconds with a 5-second
    # timeout. After 5 consecutive failures, the container is marked as unhealthy.
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "docflow", "-d", "docflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Ollama
  ollama:
    build:
      context: ..
      dockerfile: Dockerfile.ollama
    # Tag the built image so the "ollama-init" service can reuse it without rebuilding
    image: docflow-ollama:0.31.1
    environment:
      # "host:port"
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://localhost:11434 ollama list"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 8g
    command: ["serve"]
    restart: unless-stopped

  # Ollama initializer (must run after the "ollama" service)
  ollama-init:
    # Reuse the image built by the "ollama" service
    image: docflow-ollama:0.31.1
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    command: ["pull", "nomic-embed-text:v1.5"]
    restart: "no"

  # Knowledge base
  knowledge-db:
    build:
      context: ..
      dockerfile: Dockerfile.knowledge-db
    environment:
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
      POSTGRES_DB: docflow
    volumes:
      - knowledge-db-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "docflow", "-d", "docflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Database administration UI
  adminer:
    image: adminer:5.4.2
    ports:
      - "8081:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      knowledge-db:
        condition: service_healthy
    restart: unless-stopped

  # MCP server (development mode: editable install from the mounted workspace)
  # In production, use Dockerfile.mcp instead.
  mcp:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.airflow
    environment:
      # A hardcoded dev key — change this when deploying outside localhost.
      DOCFLOW_MCP_API_KEY: "docflow"
      DOCFLOW_EMBEDDINGS_API_URL: "http://ollama:11434/api/embeddings"
      DOCFLOW_KNOWLEDGE_DB_HOST: "knowledge-db"
      DOCFLOW_KNOWLEDGE_DB_USER: "docflow"
      DOCFLOW_KNOWLEDGE_DB_PASSWORD: "docflow"
      DOCFLOW_KNOWLEDGE_DB_PORT: "5432"
      DOCFLOW_KNOWLEDGE_DB_NAME: "docflow"
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace/docflow
      # Cache downloaded packages so repeated container recreations are fast.
      - mcp-pip-cache:/home/airflow/.cache/pip
    command:
      - bash
      - -c
      - "pip install -q -e '/workspace/docflow[mcp]' && docflow-mcp"
    depends_on:
      ollama:
        condition: service_healthy
      knowledge-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  airflow-pip-cache:
  airflow-db-data:
  ollama-data:
  knowledge-db-data:
  mcp-pip-cache:
